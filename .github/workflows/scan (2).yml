name: Raptor Scanner v2

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Forza refresh cache'
        required: false
        default: 'false'
        type: boolean

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/cache logs

      - name: Force refresh cache
        if: ${{ github.event.inputs.force_refresh == 'true' }}
        run: rm -f data/cache/*.json

      - name: Run scanner
        run: python fetch_and_compute.py

      - name: Statistiche
        if: always()
        run: |
          echo "=== STATISTICHE ==="
          if [ -f data/signals.json ]; then
            python3 - <<'PYEOF'
import json
with open('data/signals.json') as f:
    d = json.load(f)
m = d['meta']
print(f"Ticker: {m['total']}")
print(f"Segnali: {m['signal_counts']}")
print(f"Rating: {m['rating_counts']}")
print(f"Errori: {len(m['errors'])}")
print(f"Skip: {len(m['skipped'])}")
PYEOF
          fi
          if [ -f data/signals_history.json ]; then
            python3 - <<'PYEOF'
import json
with open('data/signals_history.json') as f:
    h = json.load(f)
print(f"Ticker in history: {len(h)}")
print(f"Totale eventi: {sum(len(v) for v in h.values())}")
PYEOF
          fi
          echo "=== LOG ==="
          tail -30 logs/run.log 2>/dev/null || echo "No log"

      - name: Commit risultati
        if: always()
        run: |
          git config user.name "raptor-bot"
          git config user.email "bot@raptor"
          git add data/signals.json data/signals_history.json logs/run.log
          git diff --staged --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload log su errore
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: logs/
          retention-days: 7
