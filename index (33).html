<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPTOR SCANNER v2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #07080a;
  --bg2:       #0d0f12;
  --bg3:       #13161b;
  --border:    #1e2229;
  --border2:   #2a2f38;
  --text:      #c8cdd6;
  --text2:     #7a8494;
  --text3:     #454d5a;
  --accent:    #e8f01a;
  --buy3:      #00e676;
  --buy2:      #29b6f6;
  --buy1:      #4fc3f7;
  --sell:      #ff5252;
  --watch:     #ffb300;
  --ranging:   #546e7a;
  --sb:        #00e676;
  --buy:       #29b6f6;
  --neutral:   #90a4ae;
  --sell-r:    #ff5252;
  --ss:        #ff1744;
  --font-mono: 'Space Mono', monospace;
  --font-cond: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ───────────────────────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 48px;
}

.logo {
  font-family: var(--font-cond);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  flex-shrink: 0;
}

.logo span { color: var(--text2); font-weight: 300; }

.topbar-meta {
  display: flex;
  gap: 16px;
  align-items: center;
  flex: 1;
  overflow: hidden;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text3);
}

.topbar-meta .ts { color: var(--text2); }
.topbar-meta .ok { color: var(--buy3); }
.topbar-meta .err { color: var(--sell); }

.vix-badge {
  margin-left: auto;
  font-family: var(--font-cond);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 3px;
  flex-shrink: 0;
}
.vix-ok   { background: rgba(0,230,118,.15); color: var(--buy3); border: 1px solid rgba(0,230,118,.3); }
.vix-warn { background: rgba(255,179,0,.15);  color: var(--watch); border: 1px solid rgba(255,179,0,.3); }
.vix-high { background: rgba(255,82,82,.15);  color: var(--sell); border: 1px solid rgba(255,82,82,.3); }

/* ── LAYOUT ───────────────────────────────────────────────────────────────── */
.main-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 48px);
}

/* ── SIDEBAR ──────────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 48px;
  height: calc(100vh - 48px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.sidebar-section {
  padding: 0 16px;
  margin-bottom: 24px;
}

.sidebar-label {
  font-family: var(--font-cond);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* Stat mini boxes */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.stat-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  text-align: center;
}

.stat-box .val {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}

.stat-box .lbl {
  font-family: var(--font-cond);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text3);
  margin-top: 3px;
  text-transform: uppercase;
}

.stat-box.buy3 .val  { color: var(--buy3); }
.stat-box.buy2 .val  { color: var(--buy2); }
.stat-box.buy1 .val  { color: var(--buy1); }
.stat-box.sell .val  { color: var(--sell); }
.stat-box.watch .val { color: var(--watch); }
.stat-box.total .val { color: var(--accent); }

/* Filtri categoria */
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 6px 10px;
  margin-bottom: 3px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 3px;
  color: var(--text2);
  font-family: var(--font-cond);
  font-size: 13px;
  letter-spacing: .5px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
}

.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active {
  background: var(--bg3);
  border-color: var(--border2);
  color: var(--accent);
}

.filter-btn .cnt {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

/* Filtri segnale */
.signal-filters {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sig-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font-cond);
  font-size: 12px;
  letter-spacing: .5px;
  transition: background .15s;
  user-select: none;
}

.sig-filter:hover { background: var(--bg3); }
.sig-filter input { accent-color: var(--accent); }
.sig-filter .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Rating filters */
.rating-filters {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.rat-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font-cond);
  font-size: 11px;
  letter-spacing: .5px;
  transition: background .15s;
  user-select: none;
}
.rat-filter:hover { background: var(--bg3); }
.rat-filter input { accent-color: var(--accent); }

/* ── CONTENT ──────────────────────────────────────────────────────────────── */
.content {
  padding: 16px 20px;
  overflow: hidden;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 360px;
}

.search-wrap input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 7px 12px 7px 32px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}

.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 13px;
}

.sort-select {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 7px 10px;
  color: var(--text);
  font-family: var(--font-cond);
  font-size: 13px;
  outline: none;
  cursor: pointer;
}

.sort-select:focus { border-color: var(--accent); }

.results-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

/* ── TOP SIGNALS BAR ──────────────────────────────────────────────────────── */
.top-signals {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.top-sig-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
}

.top-sig-card h3 {
  font-family: var(--font-cond);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.top-sig-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.top-sig-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 2px;
  transition: background .1s;
}
.top-sig-row:hover { background: var(--bg3); }

.top-sig-row .ticker {
  font-weight: 700;
  font-size: 12px;
  min-width: 70px;
}

.top-sig-row .score-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.top-sig-row .score-fill {
  height: 100%;
  border-radius: 2px;
}

.top-sig-row .score-val {
  font-size: 10px;
  color: var(--text2);
  min-width: 28px;
  text-align: right;
}

/* ── TABLE ────────────────────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
}

thead th {
  background: var(--bg2);
  padding: 8px 12px;
  text-align: left;
  font-family: var(--font-cond);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
  white-space: nowrap;
}

thead th:hover { color: var(--text2); }
thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  cursor: pointer;
}

tbody tr:hover { background: var(--bg2); }
tbody tr:last-child { border-bottom: none; }

td { padding: 7px 12px; }

td.ticker-col {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 12px;
  color: var(--text);
}

td.ticker-col a {
  color: inherit;
  text-decoration: none;
}
td.ticker-col a:hover { color: var(--accent); }

td.nome-col {
  color: var(--text2);
  font-size: 11px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}

td.price-col {
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: right;
}

td.chg-col {
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: right;
  font-weight: 700;
}

td.num-col {
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: right;
  color: var(--text2);
}

td.cat-col {
  font-family: var(--font-cond);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .5px;
}

/* Signal badge */
.sig-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: 2px;
  font-family: var(--font-cond);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
}

.sig-badge.BUY3    { background: rgba(0,230,118,.15); color: var(--buy3); border: 1px solid rgba(0,230,118,.3); }
.sig-badge.BUY2    { background: rgba(41,182,246,.15); color: var(--buy2); border: 1px solid rgba(41,182,246,.3); }
.sig-badge.BUY1    { background: rgba(79,195,247,.1); color: var(--buy1); border: 1px solid rgba(79,195,247,.25); }
.sig-badge.SELL    { background: rgba(255,82,82,.15); color: var(--sell); border: 1px solid rgba(255,82,82,.3); }
.sig-badge.WATCH   { background: rgba(255,179,0,.12); color: var(--watch); border: 1px solid rgba(255,179,0,.3); }
.sig-badge.RANGING { background: rgba(84,110,122,.15); color: var(--ranging); border: 1px solid rgba(84,110,122,.3); }

/* Rating badge */
.rat-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 2px;
  font-family: var(--font-cond);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .5px;
}

.rat-badge.STRONG_BUY  { background: rgba(0,230,118,.2); color: var(--sb); }
.rat-badge.BUY         { background: rgba(41,182,246,.2); color: var(--buy); }
.rat-badge.NEUTRAL     { background: rgba(144,164,174,.15); color: var(--neutral); }
.rat-badge.SELL        { background: rgba(255,82,82,.15); color: var(--sell-r); }
.rat-badge.STRONG_SELL { background: rgba(255,23,68,.2); color: var(--ss); }

/* Score bar inline */
.score-inline {
  display: flex;
  align-items: center;
  gap: 6px;
}

.score-inline .bar {
  width: 50px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.score-inline .fill {
  height: 100%;
  border-radius: 2px;
  transition: width .3s;
}

.score-inline .num {
  font-family: var(--font-mono);
  font-size: 11px;
  min-width: 24px;
  text-align: right;
}

/* Indicatori bull/bear inline */
.ind-row {
  display: flex;
  gap: 3px;
}

.ind-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.ind-dot.bull { background: var(--buy3); }
.ind-dot.bear { background: var(--sell); }
.ind-dot.na   { background: var(--border2); }

/* Momentum */
.mom-val { font-family: var(--font-mono); font-size: 11px; }

/* Signal date */
.sig-date {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

/* ── MODAL ────────────────────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  overflow-y: auto;
  scrollbar-width: thin;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg2);
  z-index: 1;
}

.modal-title {
  font-family: var(--font-cond);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 3px;
  line-height: 1;
}
.modal-close:hover { color: var(--text); background: var(--bg3); }

.modal-body { padding: 20px; }

.modal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}

.modal-stat {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
}

.modal-stat .ms-label {
  font-family: var(--font-cond);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.modal-stat .ms-val {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
}

/* Chart area */
.chart-area {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 16px;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.chart-canvas {
  width: 100%;
  height: 200px;
}

/* History table nel modal */
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.history-table th {
  font-family: var(--font-cond);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.history-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
}

.history-table tr:last-child td { border-bottom: none; }

/* ── LOADING / ERROR ──────────────────────────────────────────────────────── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  gap: 16px;
  color: var(--text2);
}

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  background: rgba(255,82,82,.1);
  border: 1px solid rgba(255,82,82,.3);
  border-radius: 4px;
  padding: 12px 16px;
  color: var(--sell);
  font-family: var(--font-mono);
  font-size: 12px;
  margin: 20px;
}

/* ── PAGINATION ───────────────────────────────────────────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 0;
  font-family: var(--font-mono);
  font-size: 12px;
}

.page-btn {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--text2);
  padding: 5px 10px;
  cursor: pointer;
  transition: all .15s;
}

.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }

/* ── RESPONSIVE ───────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .top-signals { grid-template-columns: 1fr; }
  td.nome-col, td.cat-col { display: none; }
}

/* ── UTILITY ──────────────────────────────────────────────────────────────── */
.green  { color: var(--buy3); }
.red    { color: var(--sell); }
.yellow { color: var(--watch); }
.muted  { color: var(--text3); }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">RAPTOR <span>SCANNER</span> <span style="color:var(--accent);font-size:11px">v2</span></div>
  <div class="topbar-meta">
    <span>AGGIORNATO: <span class="ts" id="ts">—</span></span>
    <span class="ok" id="meta-ok">—</span>
    <span class="err" id="meta-err"></span>
  </div>
  <div class="vix-badge vix-ok" id="vix-badge">VIX —</div>
</div>

<!-- MAIN -->
<div class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Segnali</div>
      <div class="stat-grid">
        <div class="stat-box buy3"><div class="val" id="cnt-buy3">—</div><div class="lbl">BUY3</div></div>
        <div class="stat-box buy2"><div class="val" id="cnt-buy2">—</div><div class="lbl">BUY2</div></div>
        <div class="stat-box buy1"><div class="val" id="cnt-buy1">—</div><div class="lbl">BUY1</div></div>
        <div class="stat-box sell"><div class="val" id="cnt-sell">—</div><div class="lbl">SELL</div></div>
        <div class="stat-box watch"><div class="val" id="cnt-watch">—</div><div class="lbl">WATCH</div></div>
        <div class="stat-box total"><div class="val" id="cnt-total">—</div><div class="lbl">TOTALE</div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Filtra Segnale</div>
      <div class="signal-filters">
        <label class="sig-filter"><input type="checkbox" checked value="BUY3"><span class="dot" style="background:var(--buy3)"></span>BUY3 ★</label>
        <label class="sig-filter"><input type="checkbox" checked value="BUY2"><span class="dot" style="background:var(--buy2)"></span>BUY2</label>
        <label class="sig-filter"><input type="checkbox" checked value="BUY1"><span class="dot" style="background:var(--buy1)"></span>BUY1</label>
        <label class="sig-filter"><input type="checkbox" checked value="WATCH"><span class="dot" style="background:var(--watch)"></span>WATCH</label>
        <label class="sig-filter"><input type="checkbox" value="SELL"><span class="dot" style="background:var(--sell)"></span>SELL</label>
        <label class="sig-filter"><input type="checkbox" value="RANGING"><span class="dot" style="background:var(--ranging)"></span>RANGING</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Rating</div>
      <div class="rating-filters">
        <label class="rat-filter"><input type="checkbox" checked value="STRONG_BUY"><span style="color:var(--sb)">■</span> STRONG BUY</label>
        <label class="rat-filter"><input type="checkbox" checked value="BUY"><span style="color:var(--buy)">■</span> BUY</label>
        <label class="rat-filter"><input type="checkbox" checked value="NEUTRAL"><span style="color:var(--neutral)">■</span> NEUTRAL</label>
        <label class="rat-filter"><input type="checkbox" value="SELL"><span style="color:var(--sell-r)">■</span> SELL</label>
        <label class="rat-filter"><input type="checkbox" value="STRONG_SELL"><span style="color:var(--ss)">■</span> STRONG SELL</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Categoria</div>
      <div id="cat-filters"></div>
    </div>

  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- Top signals -->
    <div class="top-signals" id="top-signals">
      <div class="top-sig-card">
        <h3>🟢★ Top BUY3</h3>
        <div class="top-sig-list" id="top-buy3">—</div>
      </div>
      <div class="top-sig-card">
        <h3>🔵 Top BUY2</h3>
        <div class="top-sig-list" id="top-buy2">—</div>
      </div>
      <div class="top-sig-card">
        <h3>📈 Top Score</h3>
        <div class="top-sig-list" id="top-score">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Cerca ticker o nome...">
      </div>
      <select class="sort-select" id="sort-by">
        <option value="score-desc">Score ↓</option>
        <option value="signal">Segnale</option>
        <option value="er-desc">ER ↓</option>
        <option value="mom3m-desc">Mom 3m ↓</option>
        <option value="mom1m-desc">Mom 1m ↓</option>
        <option value="chg-desc">Var% oggi ↓</option>
        <option value="ticker">Ticker A→Z</option>
      </select>
      <span class="results-count" id="results-count"></span>
    </div>

    <!-- Loading -->
    <div class="loading-screen" id="loading">
      <div class="spinner"></div>
      <span>Caricamento signals.json...</span>
    </div>

    <div class="error-msg hidden" id="error-msg"></div>

    <!-- Table -->
    <div class="table-wrap hidden" id="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="signal">SEGNALE</th>
            <th data-sort="ticker">TICKER</th>
            <th class="nome-col">NOME</th>
            <th data-sort="price-desc">PREZZO</th>
            <th data-sort="chg-desc">VAR%</th>
            <th data-sort="score-desc">SCORE</th>
            <th data-sort="er-desc">ER</th>
            <th>KAMA%</th>
            <th>IND</th>
            <th data-sort="mom1m-desc">1M%</th>
            <th data-sort="mom3m-desc">3M%</th>
            <th>RATING</th>
            <th>DATA SEG.</th>
            <th class="cat-col">CAT</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>

  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── CONFIGURAZIONE ────────────────────────────────────────────────────────────
const SIGNALS_URL  = 'data/signals.json';
const HISTORY_URL  = 'data/signals_history.json';
const VIX_URL      = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=2d';
const PAGE_SIZE    = 50;
const TV_BASE      = 'https://www.tradingview.com/chart/?symbol=';

// ── STATE ─────────────────────────────────────────────────────────────────────
let allData     = [];
let filtered    = [];
let historyData = {};
let currentPage = 1;
let sortKey     = 'score-desc';
let sortCol     = null;
let categories  = [];

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadSignals(), loadVix()]);
}

async function loadSignals() {
  try {
    const r = await fetch(SIGNALS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const json = await r.json();
    const meta = json.meta || {};
    allData    = json.signals || [];

    // Topbar
    document.getElementById('ts').textContent      = meta.generated_display || '—';
    document.getElementById('meta-ok').textContent = `✓ ${meta.total || 0} ETF`;
    const errs = (meta.errors||[]).length + (meta.skipped||[]).length;
    if (errs > 0)
      document.getElementById('meta-err').textContent = `⚠ ${errs} errori`;

    // Categorie
    const catSet = new Set(allData.map(d => d.categoria));
    categories   = [...catSet].sort();
    buildCatFilters();

    // Conta segnali
    updateCounts(allData);

    // Top panels
    renderTopPanels(allData);

    // Carica history in background
    loadHistory();

    // Prima render
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('table-wrap').classList.remove('hidden');
    applyFiltersAndRender();

  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    const el = document.getElementById('error-msg');
    el.textContent = `Errore caricamento dati: ${e.message}. Assicurati che il workflow GitHub Actions sia stato eseguito.`;
    el.classList.remove('hidden');
  }
}

async function loadHistory() {
  try {
    const r = await fetch(HISTORY_URL + '?t=' + Date.now());
    if (r.ok) historyData = await r.json();
  } catch(e) { /* silenzioso */ }
}

async function loadVix() {
  try {
    const r = await fetch(VIX_URL);
    const d = await r.json();
    const closes = d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close || [];
    const vix = closes.filter(v => v != null).at(-1);
    if (!vix) return;
    const badge = document.getElementById('vix-badge');
    badge.textContent = `VIX ${vix.toFixed(1)}`;
    if (vix < 20)      { badge.className = 'vix-badge vix-ok'; }
    else if (vix < 25) { badge.className = 'vix-badge vix-warn'; }
    else               { badge.className = 'vix-badge vix-high'; }
  } catch(e) { /* silenzioso */ }
}

// ── FILTRI CATEGORIA ──────────────────────────────────────────────────────────
function buildCatFilters() {
  const counts = {};
  allData.forEach(d => { counts[d.categoria] = (counts[d.categoria]||0)+1; });
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = '';

  // Bottone "Tutti"
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.dataset.cat = 'ALL';
  all.innerHTML = `<span>Tutti</span><span class="cnt">${allData.length}</span>`;
  all.onclick = () => setCat('ALL');
  wrap.appendChild(all);

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `<span>${cat}</span><span class="cnt">${counts[cat]||0}</span>`;
    btn.onclick = () => setCat(cat);
    wrap.appendChild(btn);
  });
}

let activeCat = 'ALL';
function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  currentPage = 1;
  applyFiltersAndRender();
}

// ── CONTATORI ─────────────────────────────────────────────────────────────────
function updateCounts(data) {
  const counts = {};
  data.forEach(d => { counts[d.signal] = (counts[d.signal]||0)+1; });
  document.getElementById('cnt-buy3').textContent  = counts['BUY3']   || 0;
  document.getElementById('cnt-buy2').textContent  = counts['BUY2']   || 0;
  document.getElementById('cnt-buy1').textContent  = counts['BUY1']   || 0;
  document.getElementById('cnt-sell').textContent  = counts['SELL']   || 0;
  document.getElementById('cnt-watch').textContent = counts['WATCH']  || 0;
  document.getElementById('cnt-total').textContent = data.length;
}

// ── TOP PANELS ────────────────────────────────────────────────────────────────
function renderTopPanels(data) {
  const buy3  = data.filter(d => d.signal==='BUY3').sort((a,b) => b.score-a.score).slice(0,5);
  const buy2  = data.filter(d => d.signal==='BUY2').sort((a,b) => b.score-a.score).slice(0,5);
  const top   = [...data].sort((a,b) => b.score-a.score).slice(0,5);

  renderTopList('top-buy3', buy3, 'var(--buy3)');
  renderTopList('top-buy2', buy2, 'var(--buy2)');
  renderTopList('top-score', top, 'var(--accent)');
}

function renderTopList(id, items, color) {
  const el = document.getElementById(id);
  if (!items.length) { el.innerHTML = '<span class="muted" style="font-size:11px">Nessun segnale</span>'; return; }
  el.innerHTML = items.map(d => `
    <div class="top-sig-row" onclick="openModal('${d.ticker}')">
      <span class="ticker" style="color:${color}">${d.ticker.split('.')[0]}</span>
      <div class="score-bar"><div class="score-fill" style="width:${d.score}%;background:${color}40"></div></div>
      <span class="score-val">${d.score}</span>
    </div>
  `).join('');
}

// ── FILTRI E RENDER ───────────────────────────────────────────────────────────
function getActiveSignals() {
  return [...document.querySelectorAll('.signal-filters input:checked')].map(i => i.value);
}

function getActiveRatings() {
  return [...document.querySelectorAll('.rating-filters input:checked')].map(i => i.value);
}

function applyFiltersAndRender() {
  const search   = document.getElementById('search').value.toLowerCase().trim();
  const signals  = getActiveSignals();
  const ratings  = getActiveRatings();

  filtered = allData.filter(d => {
    if (activeCat !== 'ALL' && d.categoria !== activeCat) return false;
    if (!signals.includes(d.signal)) return false;
    if (!ratings.includes(d.tv_rating)) return false;
    if (search) {
      const t = (d.ticker||'').toLowerCase();
      const n = (d.nome||'').toLowerCase();
      if (!t.includes(search) && !n.includes(search)) return false;
    }
    return true;
  });

  // Sort
  sortData();

  document.getElementById('results-count').textContent = `${filtered.length} risultati`;
  renderPage();
  renderPagination();
}

function sortData() {
  const key = sortKey;
  const sigOrder = { BUY3:0, BUY2:1, BUY1:2, WATCH:3, RANGING:4, SELL:5 };
  filtered.sort((a,b) => {
    switch(key) {
      case 'score-desc':  return (b.score||0)  - (a.score||0);
      case 'er-desc':     return (b.er||0)     - (a.er||0);
      case 'mom3m-desc':  return (b.mom3m||0)  - (a.mom3m||0);
      case 'mom1m-desc':  return (b.mom1m||0)  - (a.mom1m||0);
      case 'chg-desc':    return (b.chg_pct||0)- (a.chg_pct||0);
      case 'price-desc':  return (b.price||0)  - (a.price||0);
      case 'signal':      return (sigOrder[a.signal]||99) - (sigOrder[b.signal]||99);
      case 'ticker':      return (a.ticker||'').localeCompare(b.ticker||'');
      default:            return (b.score||0)  - (a.score||0);
    }
  });
}

function renderPage() {
  const start = (currentPage-1) * PAGE_SIZE;
  const page  = filtered.slice(start, start+PAGE_SIZE);
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = page.map(d => renderRow(d)).join('');
}

function renderRow(d) {
  const chgClass  = d.chg_pct > 0 ? 'green' : d.chg_pct < 0 ? 'red' : 'muted';
  const chgSign   = d.chg_pct > 0 ? '+' : '';
  const scoreColor = d.score >= 60 ? 'var(--buy3)' : d.score >= 45 ? 'var(--buy2)' : d.score >= 30 ? 'var(--watch)' : 'var(--sell)';

  // Indicatori bull (SAR, AO, KAMA above, RVI)
  const inds = [
    d.sar_bull   ? 'bull' : 'bear',
    d.ao_rising  ? 'bull' : 'bear',
    d.kama_above ? 'bull' : 'bear',
    d.rvi_bull   ? 'bull' : 'bear',
  ];

  const tvLink = `${TV_BASE}${d.ticker.replace('.MI','%3ABITMEX').replace('.DE','%3AXETRA')}`;
  const tvLinkClean = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(d.ticker)}`;

  return `<tr onclick="openModal('${d.ticker}')">
    <td><span class="sig-badge ${d.signal}">${d.signal}</span></td>
    <td class="ticker-col">
      <a href="${tvLinkClean}" target="_blank" onclick="event.stopPropagation()">${d.ticker.split('.')[0]}</a>
      <span style="font-size:9px;color:var(--text3)">.${d.ticker.split('.')[1]||''}</span>
    </td>
    <td class="nome-col">${d.nome||'—'}</td>
    <td class="price-col">${(d.price||0).toFixed(2)}</td>
    <td class="chg-col ${chgClass}">${chgSign}${(d.chg_pct||0).toFixed(2)}%</td>
    <td>
      <div class="score-inline">
        <div class="bar"><div class="fill" style="width:${d.score||0}%;background:${scoreColor}"></div></div>
        <span class="num" style="color:${scoreColor}">${d.score||0}</span>
      </div>
    </td>
    <td class="num-col">${d.er != null ? (d.er*100).toFixed(0)+'%' : '—'}</td>
    <td class="num-col" style="color:${(d.k_pct||0)>0?'var(--buy3)':'var(--sell)'}">
      ${(d.k_pct||0)>0?'+':''}${(d.k_pct||0).toFixed(1)}%
    </td>
    <td>
      <div class="ind-row">
        ${inds.map(c => `<div class="ind-dot ${c}" title="${c}"></div>`).join('')}
      </div>
    </td>
    <td class="num-col ${d.mom1m>0?'green':d.mom1m<0?'red':''}">${d.mom1m!=null?(d.mom1m>0?'+':'')+d.mom1m.toFixed(1)+'%':'—'}</td>
    <td class="num-col ${d.mom3m>0?'green':d.mom3m<0?'red':''}">${d.mom3m!=null?(d.mom3m>0?'+':'')+d.mom3m.toFixed(1)+'%':'—'}</td>
    <td><span class="rat-badge ${d.tv_rating}">${(d.tv_rating||'').replace('_',' ')}</span></td>
    <td class="sig-date">${d.signal_date||'—'}</td>
    <td class="cat-col">${d.categoria||'—'}</td>
  </tr>`;
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const el    = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1 || i===total || Math.abs(i-currentPage)<=2)
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===3)
      html += `<span class="muted">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderPage();
  renderPagination();
  window.scrollTo(0, 0);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(ticker) {
  const d = allData.find(x => x.ticker === ticker);
  if (!d) return;

  document.getElementById('modal-title').textContent = `${ticker} — ${d.nome||''}`;
  document.getElementById('modal-body').innerHTML = renderModalBody(d);
  document.getElementById('modal-overlay').classList.add('open');

  // Disegna mini chart
  setTimeout(() => drawChart(d), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderModalBody(d) {
  const tvLink = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(d.ticker)}`;
  const history = historyData[d.ticker] || d.recent_history || [];

  return `
    <div class="modal-grid">
      <div class="modal-stat">
        <div class="ms-label">Segnale</div>
        <div class="ms-val"><span class="sig-badge ${d.signal}">${d.signal}</span></div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Rating</div>
        <div class="ms-val"><span class="rat-badge ${d.tv_rating}">${(d.tv_rating||'').replace('_',' ')}</span></div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Prezzo</div>
        <div class="ms-val">${(d.price||0).toFixed(4)}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Var% oggi</div>
        <div class="ms-val ${d.chg_pct>0?'green':d.chg_pct<0?'red':''}">${d.chg_pct>0?'+':''}${(d.chg_pct||0).toFixed(2)}%</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Score</div>
        <div class="ms-val">${d.score||0}/100</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">ER</div>
        <div class="ms-val">${d.er!=null?(d.er*100).toFixed(1)+'%':'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">KAMA</div>
        <div class="ms-val">${d.kama!=null?d.kama.toFixed(4):'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">KAMA%</div>
        <div class="ms-val ${(d.k_pct||0)>0?'green':'red'}">${(d.k_pct||0)>0?'+':''}${(d.k_pct||0).toFixed(2)}%</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">baff</div>
        <div class="ms-val">${d.baff!=null?d.baff:'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">SAR</div>
        <div class="ms-val ${d.sar_bull?'green':'red'}">${d.sar_bull?'▲ BULL':'▼ BEAR'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">AO</div>
        <div class="ms-val ${d.ao_rising?'green':'red'}">${d.ao!=null?d.ao.toFixed(4):'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">RVI</div>
        <div class="ms-val ${d.rvi_bull?'green':'red'}">${d.rvi_bull?'BULL':'BEAR'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">RSI</div>
        <div class="ms-val ${d.rsi>70?'red':d.rsi<30?'green':''}">${d.rsi!=null?d.rsi.toFixed(1):'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">ADX</div>
        <div class="ms-val">${d.adx!=null?d.adx.toFixed(1):'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Mom 1M</div>
        <div class="ms-val ${d.mom1m>0?'green':d.mom1m<0?'red':''}">${d.mom1m!=null?(d.mom1m>0?'+':'')+d.mom1m.toFixed(2)+'%':'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Mom 3M</div>
        <div class="ms-val ${d.mom3m>0?'green':d.mom3m<0?'red':''}">${d.mom3m!=null?(d.mom3m>0?'+':'')+d.mom3m.toFixed(2)+'%':'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Mom 6M</div>
        <div class="ms-val ${d.mom6m>0?'green':d.mom6m<0?'red':''}">${d.mom6m!=null?(d.mom6m>0?'+':'')+d.mom6m.toFixed(2)+'%':'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Segnale dal</div>
        <div class="ms-val" style="font-size:13px">${d.signal_date||'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Barre</div>
        <div class="ms-val">${d.signal_bars!=null?d.signal_bars+'gg':'—'}</div>
      </div>
      <div class="modal-stat">
        <div class="ms-label">Trend KAMA</div>
        <div class="ms-val" style="color:${d.kama_trend==='VERDE'?'var(--buy3)':d.kama_trend==='ROSSO'?'var(--sell)':'var(--text2)'}">${d.kama_trend||'—'}</div>
      </div>
    </div>

    <!-- Mini chart -->
    <div class="chart-area">
      <canvas class="chart-canvas" id="modal-chart"></canvas>
    </div>

    <!-- Link TradingView -->
    <div style="margin-bottom:16px">
      <a href="${tvLink}" target="_blank"
         style="font-family:var(--font-cond);font-size:13px;color:var(--accent);letter-spacing:1px;text-decoration:none">
        ↗ Apri grafico su TradingView
      </a>
    </div>

    <!-- History -->
    ${history.length ? `
    <div style="margin-bottom:8px;font-family:var(--font-cond);font-size:11px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase">
      Storia Segnali
    </div>
    <table class="history-table">
      <thead><tr><th>Data</th><th>Segnale</th><th>Prezzo</th></tr></thead>
      <tbody>
        ${[...history].reverse().slice(0,20).map(h => `
          <tr>
            <td>${h.date}</td>
            <td><span class="sig-badge ${h.signal}" style="font-size:10px;padding:1px 5px">${h.signal}</span></td>
            <td>${h.price!=null?h.price.toFixed(4):'—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    ` : '<div class="muted" style="font-size:12px">Nessuna history disponibile</div>'}
  `;
}

// ── MINI CHART CANVAS ─────────────────────────────────────────────────────────
function drawChart(d) {
  const canvas = document.getElementById('modal-chart');
  if (!canvas || !d.chart) return;
  const chart = d.chart;
  if (!chart.closes || !chart.closes.length) return;

  const ctx  = canvas.getContext('2d');
  const W    = canvas.parentElement.clientWidth - 32;
  const H    = 200;
  canvas.width  = W;
  canvas.height = H;

  const closes = chart.closes.filter(v => v != null);
  const kama   = (chart.kama||[]).filter(v => v != null);
  const allVals = [...closes, ...kama].filter(v => v != null);
  if (!allVals.length) return;

  const minV = Math.min(...allVals) * 0.995;
  const maxV = Math.max(...allVals) * 1.005;
  const scaleX = v => Math.round(v / (chart.closes.length-1) * (W-20) + 10);
  const scaleY = v => Math.round(H - ((v-minV)/(maxV-minV)) * (H-20) - 10);

  ctx.clearRect(0, 0, W, H);

  // Griglia
  ctx.strokeStyle = '#1e2229';
  ctx.lineWidth = 1;
  for (let i=0; i<=4; i++) {
    const y = Math.round(10 + (H-20)/4 * i);
    ctx.beginPath(); ctx.moveTo(10,y); ctx.lineTo(W-10,y); ctx.stroke();
  }

  // KAMA
  if (chart.kama) {
    ctx.strokeStyle = '#e8f01a66';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let first = true;
    chart.kama.forEach((v,i) => {
      if (v == null) return;
      first ? ctx.moveTo(scaleX(i), scaleY(v)) : ctx.lineTo(scaleX(i), scaleY(v));
      first = false;
    });
    ctx.stroke();
  }

  // Closes
  ctx.strokeStyle = '#c8cdd6';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  let first = true;
  chart.closes.forEach((v,i) => {
    if (v == null) return;
    first ? ctx.moveTo(scaleX(i), scaleY(v)) : ctx.lineTo(scaleX(i), scaleY(v));
    first = false;
  });
  ctx.stroke();

  // Segnali come punti colorati
  const sigColors = { BUY3:'#00e676', BUY2:'#29b6f6', BUY1:'#4fc3f7', SELL:'#ff5252', WATCH:'#ffb300' };
  if (chart.signals) {
    let prevSig = null;
    chart.signals.forEach((sig, i) => {
      if (sig !== prevSig && sig !== 'RANGING' && chart.closes[i] != null) {
        const col = sigColors[sig];
        if (col) {
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.arc(scaleX(i), scaleY(chart.closes[i]), 4, 0, Math.PI*2);
          ctx.fill();
        }
        prevSig = sig;
      }
    });
  }

  // Prezzo corrente
  const lastClose = closes.at(-1);
  const lastX     = scaleX(chart.closes.length-1);
  const lastY     = scaleY(lastClose);
  ctx.fillStyle   = '#e8f01a';
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI*2);
  ctx.fill();

  // Label prezzo
  ctx.fillStyle    = '#e8f01a';
  ctx.font         = '11px Space Mono, monospace';
  ctx.textAlign    = 'right';
  ctx.fillText(lastClose.toFixed(2), W-12, lastY-6);
}

// ── SORT COLONNE ──────────────────────────────────────────────────────────────
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.onclick = () => {
    const key = th.dataset.sort;
    if (sortKey === key) {
      // Toggle asc/desc
      if (key.endsWith('-desc')) sortKey = key.replace('-desc','');
      else sortKey = key + '-desc';
    } else {
      sortKey = key;
    }
    document.querySelectorAll('thead th').forEach(t => t.className = '');
    th.className = sortKey.includes('desc') ? 'sort-desc' : 'sort-asc';
    currentPage = 1;
    applyFiltersAndRender();
  };
});

// ── SELECT SORT ───────────────────────────────────────────────────────────────
document.getElementById('sort-by').onchange = function() {
  sortKey = this.value;
  currentPage = 1;
  applyFiltersAndRender();
};

// ── SEARCH ────────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search').oninput = function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; applyFiltersAndRender(); }, 250);
};

// ── CHECKBOX FILTRI ───────────────────────────────────────────────────────────
document.querySelectorAll('.signal-filters input, .rating-filters input').forEach(cb => {
  cb.onchange = () => { currentPage = 1; applyFiltersAndRender(); };
});

// ── MODAL CLOSE ───────────────────────────────────────────────────────────────
document.getElementById('modal-overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
